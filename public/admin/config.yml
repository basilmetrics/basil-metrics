backend:
  name: github
  repo: basilmetrics/basil-metrics
  branch: main
  base_url: https://basil-cms-oauth.basilmetrics-account.workers.dev
  auth_endpoint: /api/auth
media_folder: public/uploads
public_folder: /uploads
collections:
  - name: portfolio
    label: Portfolio
    label_singular: Case Study
    folder: src/content/portfolio
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - { label: "Client Name", name: client_name, widget: string }
      - { label: "Client Category", name: category, widget: string }
      - { label: "Platform", name: platform, widget: string }
      - { label: "Headline Result", name: result, widget: string }
      - { label: "Full Case Study Story", name: body, widget: markdown }
      - { label: "Cover Image URL", name: cover_image, widget: string }
      - { label: "Published?", name: published, widget: boolean, default: true }
  - name: blog
    label: Blog
    label_singular: Post
    folder: content/blog
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Publish Date", name: date, widget: datetime, format: "YYYY-MM-DD" }
      - { label: "Category", name: category, widget: string }
      - { label: "Body", name: body, widget: markdown }
      - { label: "Featured?", name: featured, widget: boolean, default: false }
  - name: updates
    label: Growth Journal
    label_singular: Update
    folder: content/updates
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - { label: "Date Label", name: date_label, widget: string }
      - { label: "Sort Date", name: date, widget: datetime, format: "YYYY-MM-DD" }
      - { label: "Update Type", name: type, widget: select, options: [New Service, Campaign Result, Platform Update, Pricing Change, Team Update, Milestone] }
      - { label: "Headline", name: headline, widget: string }
      - { label: "Body", name: body, widget: text }
      - { label: "Published?", name: published, widget: boolean, default: true }
  - name: homepage
    label: Homepage
    files:
      - name: settings
        label: Homepage Settings
        file: src/content/homepage/settings.json
        fields:
          - { label: "Hero Headline Line 1", name: hero_line1, widget: string, default: "Attract. Engage." }
          - { label: "Hero Headline Line 2", name: hero_line2, widget: string, default: "Grow Your F&B Brand." }
          - { label: "Hero Subtext", name: hero_subtext, widget: text, default: "We combine brand strategy, creative production, and paid media into campaigns that move real numbers for Bangkok's food and F&B brands." }
          - { label: "Stat 1 Label", name: stat1_label, widget: string, default: "Cost Per Click" }
          - { label: "Stat 1 Value", name: stat1_value, widget: string, default: "฿0.62" }
          - { label: "Stat 2 Label", name: stat2_label, widget: string, default: "Follower Growth" }
          - { label: "Stat 2 Value", name: stat2_value, widget: string, default: "+400" }
          - { label: "Stat 3 Label", name: stat3_label, widget: string, default: "Avg CTR" }
          - { label: "Stat 3 Value", name: stat3_value, widget: string, default: "3.82%" }
